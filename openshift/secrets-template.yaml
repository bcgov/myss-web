# secrets-template.yaml
# DO NOT commit real values. This file documents required secret keys only.
# Create the actual secrets in each OpenShift namespace via:
#   oc create secret generic myss-db-secret --from-literal=DATABASE_URL=...
apiVersion: v1
kind: Secret
metadata:
  name: myss-db-secret
  annotations:
    description: "PostgreSQL connection string for myss-api"
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_WITH_ACTUAL_VALUE"
  # PostgreSQL pod credentials (must match DATABASE_URL components)
  POSTGRES_USER: "REPLACE_WITH_ACTUAL_VALUE"
  POSTGRES_PASSWORD: "REPLACE_WITH_ACTUAL_VALUE"
  POSTGRES_DB: "REPLACE_WITH_ACTUAL_VALUE"
---
apiVersion: v1
kind: Secret
metadata:
  name: myss-redis-secret
  annotations:
    description: "Redis connection string for myss-api and myss-celery"
type: Opaque
stringData:
  REDIS_URL: "REPLACE_WITH_ACTUAL_VALUE"
  REDIS_PASSWORD: "REPLACE_WITH_ACTUAL_VALUE"
---
apiVersion: v1
kind: Secret
metadata:
  name: myss-icm-secret
  annotations:
    description: "Siebel REST OAuth2 credentials"
type: Opaque
stringData:
  ICM_CLIENT_ID: "REPLACE_WITH_ACTUAL_VALUE"
  ICM_CLIENT_SECRET: "REPLACE_WITH_ACTUAL_VALUE"
  ICM_TOKEN_URL: "REPLACE_WITH_ACTUAL_VALUE"
---
apiVersion: v1
kind: Secret
metadata:
  name: myss-auth-secret
  annotations:
    description: "Auth.js signing key and trust host config"
type: Opaque
stringData:
  AUTH_SECRET: "REPLACE_WITH_ACTUAL_VALUE"
  AUTH_TRUST_HOST: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: myss-mail-secret
  annotations:
    description: "MailJet HTTP API v3.1 credentials for PIN reset email"
type: Opaque
stringData:
  MAILJET_API_KEY: "REPLACE_WITH_ACTUAL_VALUE"
  MAILJET_API_SECRET: "REPLACE_WITH_ACTUAL_VALUE"
