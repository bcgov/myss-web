apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../configmap.yaml
  - ../../secrets-template.yaml
  - ../../frontend-deployment.yaml
  - mock-auth-tokens-secret.yaml

patches:
  - path: patch-frontend-configmap.yaml
    target:
      kind: ConfigMap
      name: myss-frontend-config
  - path: patch-frontend-deployment.yaml
    target:
      kind: Deployment
      name: myss-frontend

namespace: myss-test
